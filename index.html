<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Green Land Accounting</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="p-4">
    <div class="container" style="max-width: 450px;">

        <!-- Gift Box Area -->
        <div class="gift-card-wrapper">
            <div class="gift-card-shadow"></div>
            <div class="gift-card">
                <div class="gift-icon-float" title="هدية">
                    <!-- Elegant Image Gift Icon -->
                    <img src="https://img.icons8.com/?size=100&id=kLORTzuNOM2d&format=png&color=000000" alt="هدية">
                </div>
                <div class="gift-text-container">
                    <p class="gift-text-main">إلى خالي الغالي / أيمن محمد شحاته</p>
                    <p class="gift-text-sub">إهداء من المهندس / زياد عبدالكريم</p>
                </div>
            </div>
        </div>

        <!-- Main Title -->
        <h1 class="main-title">
            <span>شركة الأرض الخضراء</span>
            للتقاوي والمبيدات الزراعية
        </h1>

        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label"><i class="bi bi-envelope me-1"></i>البريد الإلكتروني</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label"><i class="bi bi-lock me-1"></i>كلمة المرور</label>
                <div class="position-relative">
                    <input type="password" id="password" class="form-control" required style="padding-left: 40px;">
                    <button type="button" id="togglePassword"
                        class="btn btn-link position-absolute top-50 text-decoration-none shadow-none text-muted"
                        style="z-index: 10; left: 5px; transform: translateY(-50%);">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                            class="bi bi-eye" viewBox="0 0 16 16">
                            <path
                                d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z" />
                            <path
                                d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z" />
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-1"></i> دخول
            </button>
        </form>
        <div id="error" class="error-container"></div>
    </div>

    <!-- Firebase compat scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- ملفات المشروع -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>

    <!-- Footer -->
    <footer class="site-footer"> الموقع من تصميم <span>م. زياد عبدالكريم || Eng. Ziad Abdulkarim</span> <br> ©2026 جميع
        الحقوق محفوظة </footer>
</body>


</html>
