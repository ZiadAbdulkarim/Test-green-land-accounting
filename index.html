<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Green Land Accounting</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="p-4">
    <div class="container" style="max-width: 450px;">

        <!-- Main Title -->
        <h1 class="main-title">
            <span>هنا</span>
        إسم الشركة
        </h1>

        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label"><i class="bi bi-envelope me-1"></i>البريد الإلكتروني</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label"><i class="bi bi-lock me-1"></i>كلمة المرور</label>
                <div class="position-relative">
                    <input type="password" id="password" class="form-control" required style="padding-left: 40px;">
                    <button type="button" id="togglePassword"
                        class="btn btn-link position-absolute top-50 text-decoration-none shadow-none text-muted"
                        style="z-index: 10; left: 5px; transform: translateY(-50%);">
                        <i id="eyeIcon" class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <!-- زر الدخول -->
            <button type="button" class="btn btn-primary w-100" id="loginBtn">
                <i class="bi bi-box-arrow-in-right me-1"></i> دخول
            </button>
            <p style="text-align: center;">(النسخة التجريبية مفتوحة بدون كلمة سر)</p>

            <script>
                document.getElementById("loginBtn").addEventListener("click", function () {
                    // مباشرة ينقلك للصفحة المطلوبة
                    window.location.href = "inventory_sales.html";
                });
            </script>
        </form>
        <div id="error" class="error-container"></div>
    </div>

    <!-- Firebase compat scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- ملفات المشروع -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>

    <!-- Footer -->
    <footer class="site-footer">تصميم وتطوير :
        <a href="https://ziadabdulkarim.github.io/Portfolio/" target="_blank" style="text-decoration: none;">
            <span>م. زياد عبدالكريم || Eng. Ziad Abdulkarim</span>
        </a>
        <br> ©2026 جميع الحقوق محفوظة
    </footer>
</body>



</html>
